<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crop Disease Forecasting System</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f5f4ef;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 {
      font-size: 20px;
      font-weight: 500;
      color: #2c2c2a;
      margin: 0 0 8px;
      text-align: center;
    }
    p {
      font-size: 13px;
      color: #5f5e5a;
      margin: 0 0 24px;
      text-align: center;
    }
    svg {
      max-width: 680px;
      width: 100%;
    }

    /* Color ramps - light mode */
    .c-blue   rect, .c-blue   circle, .c-blue   ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-teal   rect, .c-teal   circle, .c-teal   ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-amber  rect, .c-amber  circle, .c-amber  ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-coral  rect, .c-coral  circle, .c-coral  ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-green  rect, .c-green  circle, .c-green  ellipse { fill: #EAF3DE; stroke: #3B6D11; }

    .c-blue  .th, .c-blue  .ts { fill: #0C447C; }
    .c-teal  .th, .c-teal  .ts { fill: #085041; }
    .c-amber .th, .c-amber .ts { fill: #633806; }
    .c-purple .th, .c-purple .ts { fill: #3C3489; }
    .c-coral .th, .c-coral .ts { fill: #712B13; }
    .c-green .th, .c-green .ts { fill: #27500A; }

    .th { font-size: 14px; font-weight: 500; fill: #2c2c2a; }
    .ts { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    .node { cursor: pointer; }
    .node:hover rect, .node:hover circle { opacity: 0.85; }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; }
      h2 { color: #d3d1c7; }
      p { color: #888780; }
      .c-blue   rect, .c-blue   circle, .c-blue   ellipse { fill: #0C447C; stroke: #85B7EB; }
      .c-teal   rect, .c-teal   circle, .c-teal   ellipse { fill: #085041; stroke: #5DCAA5; }
      .c-amber  rect, .c-amber  circle, .c-amber  ellipse { fill: #633806; stroke: #EF9F27; }
      .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #3C3489; stroke: #AFA9EC; }
      .c-coral  rect, .c-coral  circle, .c-coral  ellipse { fill: #712B13; stroke: #F0997B; }
      .c-green  rect, .c-green  circle, .c-green  ellipse { fill: #27500A; stroke: #97C459; }

      .c-blue  .th, .c-blue  .ts { fill: #B5D4F4; }
      .c-teal  .th, .c-teal  .ts { fill: #9FE1CB; }
      .c-amber .th, .c-amber .ts { fill: #FAC775; }
      .c-purple .th, .c-purple .ts { fill: #CECBF6; }
      .c-coral .th, .c-coral .ts { fill: #F5C4B3; }
      .c-green .th, .c-green .ts { fill: #C0DD97; }

      .th { fill: #d3d1c7; }
      .ts { fill: #888780; }
      .arr { stroke: #888780; }
    }
  </style>
</head>
<body>
  <h2>Crop Disease Forecasting System</h2>
  <p>Data mining architecture for early agricultural disease outbreak prediction</p>

  <svg viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- DATA SOURCES ROW -->
    <g class="node c-blue">
      <rect x="30" y="40" width="160" height="66" rx="8" stroke-width="0.5"/>
      <text class="th" x="110" y="65" text-anchor="middle" dominant-baseline="central">Social media</text>
      <text class="ts" x="110" y="85" text-anchor="middle" dominant-baseline="central">Farmer posts, crop complaints</text>
    </g>

    <g class="node c-teal">
      <rect x="260" y="40" width="160" height="66" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="65" text-anchor="middle" dominant-baseline="central">Satellite imagery</text>
      <text class="ts" x="340" y="85" text-anchor="middle" dominant-baseline="central">NDVI, thermal, multispectral</text>
    </g>

    <g class="node c-amber">
      <rect x="490" y="40" width="160" height="66" rx="8" stroke-width="0.5"/>
      <text class="th" x="570" y="65" text-anchor="middle" dominant-baseline="central">Weather APIs</text>
      <text class="ts" x="570" y="85" text-anchor="middle" dominant-baseline="central">Humidity, temp, rainfall</text>
    </g>

    <!-- ARROWS TO FUSION -->
    <line x1="110" y1="106" x2="200" y2="200" class="arr" stroke="#378ADD" marker-end="url(#arrow)"/>
    <line x1="340" y1="106" x2="340" y2="198" class="arr" stroke="#1D9E75" marker-end="url(#arrow)"/>
    <line x1="570" y1="106" x2="480" y2="200" class="arr" stroke="#BA7517" marker-end="url(#arrow)"/>

    <!-- FUSION ENGINE -->
    <g class="node c-purple">
      <rect x="180" y="200" width="320" height="66" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="225" text-anchor="middle" dominant-baseline="central">Multi-modal fusion engine</text>
      <text class="ts" x="340" y="245" text-anchor="middle" dominant-baseline="central">NLP + computer vision + time-series ML</text>
    </g>

    <!-- ARROW TO DISEASE MODEL -->
    <line x1="340" y1="266" x2="340" y2="318" class="arr" marker-end="url(#arrow)"/>

    <!-- DISEASE PREDICTION MODEL -->
    <g class="node c-coral">
      <rect x="160" y="318" width="360" height="66" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="343" text-anchor="middle" dominant-baseline="central">Disease outbreak predictor</text>
      <text class="ts" x="340" y="363" text-anchor="middle" dominant-baseline="central">Location-aware, 14-day forecast horizon</text>
    </g>

    <!-- ARROWS TO OUTPUTS -->
    <line x1="250" y1="384" x2="130" y2="460" class="arr" stroke="#993C1D" marker-end="url(#arrow)"/>
    <line x1="340" y1="384" x2="340" y2="458" class="arr" stroke="#993C1D" marker-end="url(#arrow)"/>
    <line x1="430" y1="384" x2="550" y2="460" class="arr" stroke="#993C1D" marker-end="url(#arrow)"/>

    <!-- OUTPUT NODES -->
    <g class="node c-green">
      <rect x="30" y="460" width="170" height="66" rx="8" stroke-width="0.5"/>
      <text class="th" x="115" y="483" text-anchor="middle" dominant-baseline="central">Farmer alerts</text>
      <text class="ts" x="115" y="503" text-anchor="middle" dominant-baseline="central">SMS / app notifications</text>
    </g>

    <g class="node c-green">
      <rect x="255" y="460" width="170" height="66" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="483" text-anchor="middle" dominant-baseline="central">Risk heat maps</text>
      <text class="ts" x="340" y="503" text-anchor="middle" dominant-baseline="central">Regional outbreak risk scores</text>
    </g>

    <g class="node c-green">
      <rect x="480" y="460" width="170" height="66" rx="8" stroke-width="0.5"/>
      <text class="th" x="565" y="483" text-anchor="middle" dominant-baseline="central">Supply chain alerts</text>
      <text class="ts" x="565" y="503" text-anchor="middle" dominant-baseline="central">Early commodity price signals</text>
    </g>
  </svg>
</body>
</html>
